{% load static %}
<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Sign In | Oak & Vine</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body, html {
            height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }

        .login-wrapper {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-bg {
            position: absolute;
            inset: 0;
            background-image: url('https://images.unsplash.com/photo-1519494026892-80bbd2d6fd0d?w=1600&q=85');
            background-size: cover;
            background-position: center center;
            z-index: 0;
        }

        .login-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(
                135deg,
                rgba(109, 40, 217, 0.78) 0%,
                rgba(124, 45, 142, 0.70) 50%,
                rgba(192, 132, 252, 0.60) 100%
            );
            z-index: 1;
        }

        .login-card {
            position: relative;
            z-index: 2;
            background: rgba(255, 255, 255, 0.96);
            border-radius: 16px;
            padding: 40px 44px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 20px 60px rgba(109, 40, 217, 0.25),
                        0 4px 16px rgba(0, 0, 0, 0.12);
            text-align: center;
        }

        .login-logo-wrap {
            margin-bottom: 6px;
        }

        .login-logo {
            width: 180px;
            max-width: 100%;
        }

        .login-tagline {
            font-size: 13px;
            color: #9333ea;
            font-style: italic;
            margin-bottom: 28px;
            letter-spacing: 0.2px;
        }

        .form-group {
            margin-bottom: 16px;
            text-align: left;
        }

        .form-group label {
            display: block;
            font-size: 11px;
            font-weight: 600;
            color: #6b7280;
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .form-group input {
            width: 100%;
            padding: 11px 14px;
            border: 1px solid #ddd6fe;
            border-radius: 8px;
            font-size: 14px;
            color: #1f2937;
            background: #faf5ff;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .form-group input:focus {
            outline: none;
            border-color: #9333ea;
            box-shadow: 0 0 0 3px rgba(147, 51, 234, 0.15);
            background: #ffffff;
        }

        .login-error {
            background: #fef2f2;
            border: 1px solid #fca5a5;
            color: #dc2626;
            border-radius: 8px;
            padding: 10px 14px;
            font-size: 13px;
            margin-bottom: 14px;
            text-align: left;
        }

        .btn-signin {
            width: 100%;
            padding: 13px;
            background: linear-gradient(135deg, #7c2d8e 0%, #9333ea 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            letter-spacing: 0.3px;
            margin-top: 6px;
            transition: opacity 0.2s, transform 0.1s;
        }

        .btn-signin:hover { opacity: 0.90; }
        .btn-signin:active { transform: scale(0.99); }

        @media (max-width: 480px) {
            .login-card {
                margin: 16px;
                padding: 32px 24px;
                max-width: 100%;
                border-radius: 12px;
            }
            .login-logo { width: 150px; }
        }
    </style>
</head>
<body>
<div class="login-wrapper">
    <div class="login-bg"></div>
    <div class="login-overlay"></div>

    <div class="login-card">
        <div class="login-logo-wrap">
            <img src="{% static 'patients/img/logo_completo.png' %}" alt="Oak & Vine Health Center" class="login-logo">
        </div>

        <p class="login-tagline">Prevención, Cuidado y Confianza</p>

        <form method="post">
            {% csrf_token %}
            <div class="form-group">
                <label for="id_username">Username</label>
                <input type="text" name="username" id="id_username" autocomplete="username" placeholder="Tu usuario">
            </div>
            <div class="form-group">
                <label for="id_password">Password</label>
                <input type="password" name="password" id="id_password" autocomplete="current-password" placeholder="••••••••">
            </div>

            {% if form.errors %}
                <div class="login-error">Usuario o contraseña incorrectos.</div>
            {% endif %}

            <button type="submit" class="btn-signin">Sign In</button>
        </form>
    </div>
</div>
</body>
</html>
